<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>环球机票查询</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f13;--card:#1a1a24;--card2:#22222e;--primary:#3b82f6;--primary-light:#60a5fa;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;--border:#2a2a3a;--green:#22c55e;--amber:#f59e0b;
  --safe-bottom:env(safe-area-inset-bottom,0px);--tab-h:56px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:calc(var(--tab-h) + var(--safe-bottom) + 8px);overflow-x:hidden}
.page{display:none;padding:0 0 12px}.page.active{display:block}
.loading{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px}
.loading .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 6px}
.header h1{font-size:20px;font-weight:600}.badge{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--primary);color:#fff}
/* Route tabs */
.route-tabs{display:flex;margin:0 16px 8px;background:var(--card);border-radius:10px;overflow:hidden}
.route-tab{flex:1;text-align:center;padding:10px 0;font-size:14px;font-weight:500;color:var(--text3);cursor:pointer;position:relative;transition:.2s}
.route-tab.active{color:var(--primary-light)}.route-tab.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:24px;height:3px;border-radius:2px;background:var(--primary)}
/* Filter bar (筛选框) */
#filterArea{background:var(--card);margin:0 12px;border-radius:10px;padding:6px 10px}
.fbar{display:flex;align-items:center;gap:4px}
.fbar-city{flex:1;display:flex;align-items:baseline;gap:3px;padding:4px 8px;background:var(--card2);border-radius:8px;cursor:pointer;min-width:0}
.fbar-city .fc-label{font-size:8px;color:var(--text3);flex-shrink:0}
.fbar-city .fc-name{font-size:13px;font-weight:500;color:var(--text1)}
.fbar-city .fc-code{font-size:9px;color:var(--text3)}.fbar-city .fc-code::before{content:'('}.fbar-city .fc-code::after{content:')'}
.fbar-swap{width:20px;height:20px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:10px}
.fbar-btn{width:30px;height:30px;border-radius:8px;background:var(--primary);border:none;color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fbar-trip{display:flex;gap:6px;margin-top:4px;padding-top:4px;border-top:1px solid var(--border)}
.fbar-trip label{font-size:10px;color:var(--text3);cursor:pointer;display:flex;align-items:center;gap:2px}
.fbar-trip input[type="radio"]{accent-color:var(--primary);width:11px;height:11px}
/* Chips filter row */
.fbar-chips{display:flex;gap:4px;margin-top:4px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.fbar-chip{padding:2px 10px;font-size:11px;border-radius:12px;background:var(--card2);color:var(--text3);cursor:pointer;flex-shrink:0;transition:.15s;border:1px solid transparent}
.fbar-chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.fbar-chip:active{opacity:.7}
/* Calendar */
.calendar-section{margin:12px 16px 0;display:none}.calendar-section.show{display:block}
.calendar-section .cal-title{font-size:13px;font-weight:500;margin-bottom:8px;color:var(--text2)}
.calendar-header{display:flex;align-items:center;justify-content:space-between;padding:6px 0 8px}
.calendar-header .month-text{font-size:14px;font-weight:500}
.calendar-header .nav-btn{width:28px;height:28px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:var(--text2)}
.calendar-weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:11px;color:var(--text3);margin-bottom:4px}
.calendar-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day{text-align:center;padding:6px 0;border-radius:8px;cursor:pointer;transition:.1s}
.cal-day .day-num{font-size:13px;font-weight:500;color:var(--text)}
.cal-day .day-price{font-size:9px;color:var(--green);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:50px;margin:1px auto 0}
.cal-day .day-price.na{color:var(--text3)}
.cal-day.today .day-num{color:var(--primary-light)}
.cal-day.selected{background:var(--primary);border-radius:8px}
.cal-day.selected .day-num,.cal-day.selected .day-price{color:#fff}
.cal-day.past .day-num{color:var(--text3)}
.cal-day.past .day-price{display:none}
/* Hot routes */
.hot-section{padding:10px 16px 0}
.hot-section .section-title{font-size:14px;font-weight:500;margin-bottom:6px}
.hot-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.hot-item{background:var(--card);border-radius:10px;padding:12px 14px;cursor:pointer;transition:.1s;position:relative}
.hot-item:active{background:var(--card2)}
.hot-item .route{font-size:14px;font-weight:500;margin-bottom:2px}
.hot-item .price{font-size:13px;color:var(--green);font-weight:600}
.hot-item .price small{font-weight:400;color:var(--text3);font-size:11px}
.hot-item .meta{font-size:10px;color:var(--text3);margin-top:1px}
.hot-item .count-badge{position:absolute;top:8px;right:10px;font-size:10px;color:var(--text3)}
/* Region scrollable list */
.hot-scroll-wrap{max-height:420px;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin}
.hot-scroll-wrap::-webkit-scrollbar{width:3px}
.hot-scroll-wrap::-webkit-scrollbar-thumb{background:var(--text3);border-radius:10px}
.hot-scroll-list{display:flex;flex-direction:column;gap:8px}
.hot-scroll-item{background:var(--card);border-radius:10px;padding:12px 14px;cursor:pointer;transition:.1s;position:relative;flex-shrink:0}
.hot-scroll-item:active{background:var(--card2)}
.hot-scroll-item .s-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.hot-scroll-item .s-route{font-size:14px;font-weight:500}
.hot-scroll-item .s-price{font-size:15px;color:var(--green);font-weight:600}
.hot-scroll-item .s-row2{display:flex;justify-content:space-between;align-items:center}
.hot-scroll-item .s-meta{font-size:11px;color:var(--text3)}
.hot-scroll-item .s-avail{font-size:11px;padding:2px 8px;border-radius:8px;font-weight:500}
.s-avail-low{background:color-mix(in srgb,var(--danger) 20%,transparent);color:var(--danger)}
.s-avail-mid{background:color-mix(in srgb,var(--amber) 20%,transparent);color:var(--amber)}
.s-avail-high{background:color-mix(in srgb,var(--green) 15%,transparent);color:var(--green)}
/* Grid sort bar */
.grid-sort-bar{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.grid-sort-item{flex-shrink:0;padding:4px 12px;font-size:12px;border-radius:16px;background:var(--card2);color:var(--text3);cursor:pointer;transition:.15s}
.grid-sort-item.active{background:var(--primary);color:#fff}
.grid-sort-item:active{opacity:.8}
/* Result page */
.result-header{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--card);margin:0 0 10px;border-radius:0 0 14px 14px}
.result-header .back-btn{font-size:18px;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--card2);flex-shrink:0}
.result-header .route-info{flex:1;min-width:0}
.result-header .route-main{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result-header .route-sub{font-size:11px;color:var(--text3)}
.result-header .modify-btn{font-size:12px;color:var(--primary-light);cursor:pointer;padding:6px 12px;border-radius:16px;background:color-mix(in srgb,var(--primary) 15%,transparent);white-space:nowrap}
.result-summary{font-size:12px;color:var(--text3);padding:4px 16px 8px}
.result-summary strong{color:var(--text)}
/* Sort bar */
.sort-bar{display:flex;margin:0 16px 8px;background:var(--card);border-radius:8px;overflow:hidden}
.sort-item{flex:1;text-align:center;padding:8px 4px;font-size:12px;color:var(--text3);cursor:pointer;position:relative}
.sort-item.active{color:var(--primary-light);font-weight:500}
.sort-item.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:20px;height:2px;background:var(--primary);border-radius:2px}
/* Flight list */
.flight-list{padding:0 16px;display:flex;flex-direction:column;gap:10px}
.flight-card{background:var(--card);border-radius:12px;padding:14px;cursor:pointer;transition:.1s;position:relative;overflow:hidden}
.flight-card:active{background:var(--card2)}
.flight-card .top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.flight-card .airline-info{display:flex;align-items:center;gap:6px}
.flight-card .airline-dot{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.flight-card .airline-name{font-size:13px;font-weight:500}.flight-card .flight-no{font-size:11px;color:var(--text3);margin-left:4px}
.flight-card .tag{font-size:9px;padding:2px 6px;border-radius:4px;background:color-mix(in srgb,var(--green) 20%,transparent);color:var(--green)}
.flight-card .mid-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.flight-card .dest-block{text-align:center;flex:1}
.flight-card .dest-block .label{font-size:10px;color:var(--text3)}.flight-card .dest-block .city-name{font-size:16px;font-weight:600;margin-top:1px}
.flight-card .arrow-block{text-align:center;flex:0 0 60px}
.flight-card .arrow-block .arrow{color:var(--text3);font-size:16px}
.flight-card .arrow-block .flight{font-size:12px;font-weight:500;margin-top:1px}
.flight-card .price-block{text-align:right;flex:0 0 auto}
.flight-card .price-block .price{font-size:18px;font-weight:700;color:var(--primary-light)}
.flight-card .price-block .price small{font-size:11px;font-weight:400;color:var(--text2)}
.flight-card .price-block .tag2{font-size:10px;color:var(--green);margin-top:2px}
.flight-card .bottom-row{display:flex;gap:10px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.flight-card .bottom-row span{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:3px}
/* Flight card new date layout */
.flight-card .route-line{font-size:13px;font-weight:500;color:var(--text2);margin:6px 0 8px}
.flight-card .date-line{display:flex;align-items:center;gap:6px;padding:8px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.flight-card .date-block{display:flex;flex-direction:column;gap:1px}
.flight-card .date-label{font-size:9px;color:var(--text3);text-transform:uppercase}
.flight-card .date-val{font-size:14px;font-weight:500;color:var(--text1)}
.flight-card .date-arrow{font-size:12px;color:var(--text3);margin-top:10px}
.flight-card .time-val{font-size:10px;color:var(--text3);font-family:var(--font-mono,monospace);margin-top:1px}
/* Detail */
.detail-header-box{background:var(--card);padding:16px;margin-bottom:10px;border-radius:0 0 14px 14px}
.detail-header-box .big-route{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.detail-header-box .big-route .city-big{font-size:20px;font-weight:600}
.detail-header-box .big-route .arrow-big{font-size:14px;color:var(--text3)}
.detail-header-box .detail-meta{font-size:12px;color:var(--text2);margin-bottom:4px}
.detail-header-box .detail-tags{display:flex;gap:6px;flex-wrap:wrap}
.detail-tags .dtag{font-size:10px;padding:2px 8px;border-radius:4px;background:var(--card2);color:var(--text2)}
.cabin-section{padding:0 16px}
.cabin-group{margin-bottom:10px}
.cabin-group .cabin-title{font-size:13px;font-weight:500;margin-bottom:6px;color:var(--text2)}
.cabin-card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:6px;cursor:pointer;border:1px solid transparent;transition:.1s}
.cabin-card:active{background:var(--card2)}
.cabin-card.selected{border-color:var(--primary);background:color-mix(in srgb,var(--primary) 8%,transparent)}
.cabin-card .cabin-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.cabin-card .cabin-name{font-size:14px;font-weight:500}
.cabin-card .cabin-price{font-size:18px;font-weight:700;color:var(--primary-light)}
.cabin-card .cabin-price small{font-size:12px;font-weight:400}
.cabin-card .cabin-info{font-size:11px;color:var(--text3)}
.cabin-card .cabin-badge{font-size:9px;padding:1px 6px;border-radius:4px;background:var(--green);color:#000;opacity:.8}
.book-bar{position:fixed;bottom:calc(var(--tab-h) + var(--safe-bottom) + 8px);left:0;right:0;max-width:480px;margin:0 auto;background:var(--card);border-top:1px solid var(--border);padding:10px 16px;padding-bottom:calc(10px + var(--safe-bottom)/2);display:flex;align-items:center;justify-content:space-between;z-index:50}
.book-bar .book-price{font-size:18px;font-weight:700;color:var(--primary-light)}
.book-bar .book-price small{font-size:12px;font-weight:400;color:var(--text3)}
.book-bar .book-btn{padding:10px 28px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--primary),#2563eb);color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.book-bar .book-btn:active{opacity:.85}
/* Bottom tab */
.bottom-tab{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;height:calc(var(--tab-h) + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100}
.bottom-tab .tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--text3)}
.bottom-tab .tab-item.active{color:var(--primary-light)}
.bottom-tab .tab-item .tab-icon{font-size:20px;line-height:1}.bottom-tab .tab-item .tab-label{font-size:10px}
/* City modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200}
.modal-overlay.show{display:block}
.modal-sheet{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:var(--card);border-radius:16px 16px 0 0;z-index:201;max-height:75vh;display:flex;flex-direction:column;display:none}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--border)}
.modal-header h3{font-size:16px;font-weight:500}.modal-header .close-btn{font-size:18px;cursor:pointer;color:var(--text3);padding:4px}
.modal-search{padding:12px 16px}
.modal-search input{width:100%;padding:10px 14px;border:none;border-radius:10px;background:var(--card2);color:var(--text);font-size:14px;outline:none}
.modal-search input::placeholder{color:var(--text3)}
.modal-list{flex:1;overflow-y:auto;padding:0 16px 20px}
.city-group{margin-bottom:10px}
.city-group .group-title{font-size:12px;color:var(--text3);margin-bottom:4px;padding-left:4px}
.city-group .city-item{display:flex;align-items:center;justify-content:space-between;padding:10px 8px;cursor:pointer;border-radius:8px}
.city-group .city-item:active{background:var(--card2)}
.city-item .name-en{font-size:11px;color:var(--text3)}.city-item .count{font-size:11px;color:var(--text3)}
.hot-tag{font-size:9px;padding:1px 5px;border-radius:3px;background:var(--amber);color:#000;margin-left:6px}
/* Pax modal */
.pax-modal .pax-row-edit{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
.pax-row-edit .pax-info .pax-title{font-size:14px;font-weight:500}.pax-row-edit .pax-info .pax-sub{font-size:11px;color:var(--text3)}
.pax-stepper{display:flex;align-items:center;gap:12px}
.pax-stepper button{width:28px;height:28px;border-radius:50%;border:none;background:var(--card2);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pax-stepper button:disabled{opacity:.3}
.pax-stepper .count{font-size:16px;font-weight:500;min-width:20px;text-align:center}
.modal-confirm{width:100%;padding:14px;border:none;border-radius:12px;background:var(--primary);color:#fff;font-size:16px;font-weight:600;cursor:pointer;margin-top:12px}
/* scrollbar */
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track:transparent::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<!-- ========== PAGE: SEARCH ========== -->
<div id="page-search" class="page active">
  <div class="header">
    <div style="display:flex;align-items:center;gap:10px">
      <img src="logo.png" alt="环球机票" style="width:36px;height:36px;border-radius:50%;object-fit:cover;background:var(--card)">
      <h1>环球机票</h1>
    </div>
  </div>
  <div class="route-tabs" style="gap:2px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch">
    <div class="route-tab active" style="flex:0 0 auto;padding:8px 14px;font-size:12px" data-tab="尾单">&#128293; 尾单</div>
    <div class="route-tab" style="flex:0 0 auto;padding:8px 14px;font-size:12px" data-tab="热门">&#128293; 热门</div>
    <div class="route-tab" style="flex:0 0 auto;padding:8px 14px;font-size:12px" data-tab="日本">日本</div>
    <div class="route-tab" style="flex:0 0 auto;padding:8px 14px;font-size:12px" data-tab="韩国">韩国</div>
    <div class="route-tab" style="flex:0 0 auto;padding:8px 14px;font-size:12px" data-tab="东南亚">东南亚</div>
    <div class="route-tab" style="flex:0 0 auto;padding:8px 14px;font-size:12px" data-tab="港澳">港澳</div>
  </div>
  <div id="filterArea">
    <!-- 筛选框：出发⇄到达（一行） -->
    <div class="fbar">
      <div class="fbar-city" id="fromCity">
        <span class="fc-label">出发</span>
        <span class="fc-name">上海</span>
        <span class="fc-code" id="fromCode">PVG</span>
      </div>
      <span class="fbar-swap" id="swapBtn">&#8644;</span>
      <div class="fbar-city" id="toCity">
        <span class="fc-label">到达</span>
        <span class="fc-name" id="toName">首尔</span>
        <span class="fc-code" id="toCode">ICN</span>
      </div>
      <button class="fbar-btn" id="searchBtn">&#128269;</button>
    </div>
    <!-- 团票/单程 -->
    <div class="fbar-trip">
      <label><input type="radio" name="trip" value="round" checked> 团票</label>
      <label><input type="radio" name="trip" value="oneway"> 单程</label>
    </div>
    <!-- 月份筛选 -->
    <div class="fbar-chips" id="monthChips"></div>
    <!-- 晚数筛选 -->
    <div class="fbar-chips" id="nightChips"></div>
  </div>
      <span style="color:var(--text3);font-size:14px;">&rsaquo;</span>
    </div>
    <button class="search-btn" id="searchBtn">查 询 机 票</button>
  </div>
  <!-- Calendar -->
  <div class="calendar-section" id="calendarSection">
    <div class="cal-title">&#128197; 选择出发日期</div>
    <div class="calendar-header">
      <span class="nav-btn" id="prevMonth">&lsaquo;</span>
      <span class="month-text" id="monthText">--</span>
      <span class="nav-btn" id="nextMonth">&rsaquo;</span>
    </div>
    <div class="calendar-weekdays"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
    <div class="calendar-days" id="calendarDays"></div>
  </div>
  <!-- Hot deals / results / detail -->
  <div class="hot-section">
    <div class="section-title" style="display:flex;align-items:center;gap:8px">
      <span id="hotBackBtn" style="display:none;font-size:16px;cursor:pointer;width:24px;height:24px;align-items:center;justify-content:center;border-radius:50%;background:var(--card2);flex-shrink:0">&larr;</span>
      <span id="hotSectionBadge" style="background:var(--danger);color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500">尾单</span>
      <span id="hotSectionTitle">余位告急 · 一周内出发</span>
    </div>
    <div class="hot-grid" id="hotGrid"></div>
  </div>
</div>

<!-- ========== PAGE: RESULTS ========== -->
<div id="page-results" class="page">
  <div class="result-header">
    <span class="back-btn" id="backToSearch">&larr;</span>
    <div class="route-info"><div class="route-main" id="resultRoute">--</div><div class="route-sub" id="resultDate">--</div></div>
    <span class="modify-btn" id="modifyBtn">修改</span>
  </div>
  <div class="result-summary" id="resultSummary"></div>
  <div class="sort-bar">

<div class="modal-overlay" id="consultModal"></div>
<div class="modal-sheet" id="consultSheet" style="display:none;">

    <h3>&#128172; 咨询下单</h3>
    <span class="close-btn" id="closeConsult">&times;</span>
  </div>
  <div style="padding:16px">
    <div id="consultContent" style="font-size:13px;line-height:1.8;color:var(--text2);margin-bottom:16px"></div>
    <div style="display:flex;flex-direction:column;align-items:center;padding:12px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:16px">
      <img src="qrcode.jpg" alt="扫码进群" style="width:130px;height:130px;border-radius:8px;object-fit:cover;margin-bottom:10px;background:var(--card)">
      <div style="font-size:13px;font-weight:500;color:var(--primary-light)">扫码加入企业微信群咨询</div>
      <div style="font-size:11px;color:var(--text3);margin-top:4px">售前咨询 · 余位确认 · 价格核对</div>
    </div>
    <button class="modal-confirm" id="consultDone" style="margin-top:0">知道了</button>

  <div class="tab-item active" data-page="search"><span class="tab-icon">&#9992;</span><span class="tab-label">机票</span></div>
  <div class="tab-item" data-page="orders"><span class="tab-icon">&#128203;</span><span class="tab-label">订单</span></div>
  <div class="tab-item" data-page="profile"><span class="tab-icon">&#128100;</span><span class="tab-label">我的</span></div>
</div>

<script>
// ======== GLOBAL DATA ========
let flightRoutes = [];
let allCities = [];

// ======== STATE ========
// 机场中文名 → IATA代码映射
const AIRPORT_CODES = {
  '上海浦东机场':'PVG','上海虹桥机场':'SHA','浦东国际机场':'PVG',
  '东京成田机场':'NRT','东京羽田机场':'HND',
  '首尔仁川机场':'ICN','首尔金浦机场':'GMP','仁川国际机场':'ICN',
  '大阪关西机场':'KIX',
  '香港机场':'HKG','澳门机场':'MFM',
  '曼谷素万那普机场':'BKK',
  '普吉机场':'HKT','普吉国际机场':'HKT',
  '巴厘岛机场':'DPS',
  '新加坡樟宜机场':'SIN','樟宜机场':'SIN',
  '济州机场':'CJU','济州国际机场':'CJU',
  '清迈机场':'CNX',
  '福冈机场':'FUK',
  '冲绳那霸机场':'OKA',
  '札幌新千岁机场':'CTS',
  '釜山金海机场':'PUS',
  '亚庇国际机场':'BKI',
  '杭州萧山机场':'HGH',
  '南京禄口机场':'NKG',
  '南通兴东机场':'NTG',
  '苏南硕放机场':'WUX',
  '杜恩当机场':'?',
};
function airportCode(name){
  return AIRPORT_CODES[name] || name.replace(/机场$/,'').slice(0,3).toUpperCase();
}

const state = {
  from: {name:'上海',code:'PVG'},
  to: {name:'首尔',code:'ICN'},
  trip: 'round',
  depDate: new Date(),
  retDate: new Date(Date.now() + 3*86400000),
  adults: 1, children: 0,
  currentPage: 'search',
  currentMonth: new Date(),
  currentRoute: null,
  results: [],
  pickerTarget: 'from',
  tabChanged: true,
  filterMonth: '',  // 月份筛选: '7','8','9','10','11' 或 ''
  filterNights: '', // 晚数筛选: '3','4','5','6','7' 或 ''
  combo: {outbound: null, return: null},
  viewMode: 'home',
  currentItem: null
};
const DAY_NAMES = ['周日','周一','周二','周三','周四','周五','周六'];

// ======== LOAD DATA ========
async function loadData(){
  try{
    const resp = await fetch('flight_data.json');
    flightRoutes = await resp.json();
    // Build city list
    const citySet = {};
    flightRoutes.forEach(r => {
      if(!citySet[r.dep]) citySet[r.dep] = {name:r.dep,routes:0,asDep:0,asDest:0};
      if(!citySet[r.dest]) citySet[r.dest] = {name:r.dest,routes:0,asDep:0,asDest:0};
      citySet[r.dep].routes++; citySet[r.dep].asDep++;
      citySet[r.dest].routes++; citySet[r.dest].asDest++;
    });
    allCities = Object.values(citySet).sort((a,b)=>b.routes - a.routes);
    // Set initial dates
    updateDateDisplay();
    renderCalendar();
    renderHotRoutes();
    document.querySelectorAll('.loading-date').forEach(el => {
      if(el.textContent === '--') updateDateDisplay();
    });
  }catch(e){
    document.getElementById('hotGrid').innerHTML = '<div style="grid-column:span 2;text-align:center;padding:30px;color:var(--text3);font-size:13px;">❌ 加载数据失败，请确认 flight_data.json 存在</div>';
  }
}

// ======== CALENDAR ========
function renderCalendar(){
  const m = state.currentMonth;
  const year = m.getFullYear(), month = m.getMonth();
  document.getElementById('monthText').textContent = `${year}年${month+1}月`;
  const firstDay = new Date(year,month,1).getDay();
  const daysInMonth = new Date(year,month+1,0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);
  const container = document.getElementById('calendarDays');
  container.innerHTML = '';

  // Get price data for current route
  const routeKey = `${state.from.name}→${state.to.name}`;
  const route = flightRoutes.find(r => r.route === routeKey);
  const priceMap = route ? (route.date_prices || {}) : {};

  for(let i=0;i<firstDay;i++){
    const d = document.createElement('div'); container.appendChild(d);
  }
  for(let day=1; day<=daysInMonth; day++){
    const cell = document.createElement('div'); cell.className = 'cal-day';
    const date = new Date(year,month,day); date.setHours(0,0,0,0);
    if(date < today) cell.classList.add('past');
    if(date.getTime() === today.getTime()) cell.classList.add('today');
    if(state.depDate && date.getTime() === state.depDate.getTime()) cell.classList.add('selected');

    const iso = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const p = priceMap[iso];
    cell.innerHTML = `<div class="day-num">${day}</div>` +
      (date >= today ? `<div class="day-price${p?'':' na'}">${p ? '¥'+p : '查价'}</div>` : '');
    cell.onclick = ()=>{if(date>=today){state.depDate=date; updateDateDisplay(); renderCalendar();}};
    container.appendChild(cell);
  }
}

// ======== DATE DISPLAY ========
function updateDateDisplay(){
  const fmt = d => `${d.getMonth()+1}月${d.getDate()}日`;
  document.querySelector('#depDate .fd-value').textContent = fmt(state.depDate);
  // 返程日期显示在出发日期后
  const ret = fmt(state.retDate);
  document.querySelector('#depDate .fd-value').textContent += `-${ret}`;
}

// ======== CITY MODAL ========
function openCityPicker(target){
  state.pickerTarget = target;
  document.getElementById('cityModalTitle').textContent = target==='from'?'选择出发城市':'选择到达城市';
  document.getElementById('citySearch').value = '';
  renderCityList('');
  document.getElementById('cityModal').classList.add('show');
  document.getElementById('citySheet').style.display = 'flex';
}
function closeCityPicker(){
  document.getElementById('cityModal').classList.remove('show');
  document.getElementById('citySheet').style.display = 'none';
}
function renderCityList(query){
  const container = document.getElementById('cityList'); container.innerHTML = '';
  
  // 获取当前激活的区域Tab（如有）
  const activeTab = document.querySelector('.route-tab.active');
  const tabName = activeTab ? activeTab.dataset.tab : '';
  const REGION_MAP = {
    '日本': ['东京','大阪','冲绳','福冈','札幌'],
    '韩国': ['首尔','济州岛','釜山','清州'],
    '东南亚': ['普吉','曼谷','巴厘岛','沙巴','新加坡','富国岛','清迈'],
    '港澳': ['香港','澳门']
  };
  const regionKw = REGION_MAP[tabName] || [];
  
  if(state.pickerTarget === 'from') {
    // 出发城市：如有区域Tab则只显示能到该区域的城市
    let depCities = [...new Set(flightRoutes.map(r => r.dep))].sort();
    if(regionKw.length > 0) {
      depCities = depCities.filter(dep =>
        flightRoutes.some(r => r.dep === dep && regionKw.some(kw => r.dest.includes(kw)))
      );
    }
    let filtered = depCities.filter(c => c.includes(query));
    if(filtered.length===0){
      container.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text3);font-size:13px;">无匹配城市</div>'; return;
    }
    const group = document.createElement('div'); group.className = 'city-group';
    filtered.forEach(name => {
      const item = document.createElement('div'); item.className = 'city-item';
      const routeCount = regionKw.length > 0
        ? flightRoutes.filter(r => r.dep === name && regionKw.some(kw => r.dest.includes(kw))).length
        : flightRoutes.filter(r => r.dep === name).length;
      item.innerHTML = `<div><strong>${name}</strong></div><span class="count">${routeCount}条航线</span>`;
      item.onclick = ()=>selectCity(name);
      group.appendChild(item);
    });
    container.appendChild(group);
  } else {
    // 到达城市：从当前出发城市能到的目的地，如有区域Tab则只显示该区域
    let destCities = state.from.name
      ? [...new Set(flightRoutes.filter(r => r.dep === state.from.name).map(r => r.dest))].sort()
      : [...new Set(flightRoutes.map(r => r.dest))].sort();
    if(regionKw.length > 0) {
      destCities = destCities.filter(d => regionKw.some(kw => d.includes(kw)));
    }
    let filtered = destCities.filter(c => c.includes(query));
    if(filtered.length===0){
      container.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text3);font-size:13px;">无匹配城市</div>'; return;
    }
    const group = document.createElement('div'); group.className = 'city-group';
    filtered.forEach(name => {
      const item = document.createElement('div'); item.className = 'city-item';
      const routeCount = state.from.name
        ? flightRoutes.filter(r => r.dep === state.from.name && r.dest === name).length
        : flightRoutes.filter(r => r.dest === name).length;
      item.innerHTML = `<div><strong>${name}</strong></div><span class="count">${routeCount}条航线</span>`;
      item.onclick = ()=>selectCity(name);
      group.appendChild(item);
    });
    container.appendChild(group);
  }
}
function selectCity(name){
  state.tabChanged = false;  // 用户手动选城市
  if(state.pickerTarget === 'from') {
    state.from.name = name;
    document.querySelector('#fromCity .fc-name').textContent = name;
    document.querySelector('#fromCity .fc-code').textContent = airportCode(name);
  } else {
    state.to.name = name;
    document.querySelector('#toCity .fc-name').textContent = name;
    document.querySelector('#toCity .fc-code').textContent = airportCode(name);
  }
  closeCityPicker();
  updateCalendarPrices();
}

function updateCalendarPrices(){
  renderCalendar();
  renderHotRoutes();
}

// ======== SWAP ========
function swapCities(){
  state.tabChanged = false;
  [state.from, state.to] = [state.to, state.from];
  document.querySelector('#fromCity .fc-name').textContent = state.from.name;
  document.querySelector('#fromCity .fc-code').textContent = state.from.code;
  document.querySelector('#toCity .fc-name').textContent = state.to.name;
  document.querySelector('#toCity .fc-code').textContent = state.to.code;
  updateCalendarPrices();
}

// ======== CHIPS: 月份 + 晚数筛选 ========
function renderFilterChips(){
  const fromCity = state.from.name;
  const today = new Date(); today.setHours(0,0,0,0);
  const tripMode = document.querySelector('input[name="trip"]:checked').value;
  
  // 收集所有匹配的产品
  let items = [];
  flightRoutes.forEach(route => {
    if(route.dep !== fromCity) return;
    route.items.forEach(item => {
      if(!item.dep_date || !item.retail_price || item.retail_price <= 0) return;
      if(item.available <= 0) return;
      if(tripMode === 'round' && !item.ret_date) return;
      if(tripMode === 'oneway' && item.ret_date) return;
      items.push(item);
    });
  });
  
  // 月份去重
  const months = new Set();
  const nights = new Set();
  items.forEach(item => {
    if(item.dep_date) months.add(item.dep_date.split('-')[1]);  // '07','08'...
    if(item.nights && item.ret_date) nights.add(item.nights);
  });
  
  // 渲染月份
  const mc = document.getElementById('monthChips'); mc.innerHTML = '';
  const monthNames = {'07':'7月','08':'8月','09':'9月','10':'10月','11':'11月'};
  const monthOrder = ['07','08','09','10','11'];
  monthOrder.forEach(m => {
    if(!months.has(m)) return;
    const chip = document.createElement('span'); chip.className = 'fbar-chip';
    if(state.filterMonth === m) chip.classList.add('active');
    chip.textContent = monthNames[m] || m+'月';
    chip.onclick = ()=>{
      state.filterMonth = state.filterMonth === m ? '' : m;
      renderFilterChips();
      renderHotRoutes();
    };
    mc.appendChild(chip);
  });
  
  // 渲染晚数
  const nc = document.getElementById('nightChips'); nc.innerHTML = '';
  [3,4,5,6,7].forEach(n => {
    if(!nights.has(n)) return;
    const chip = document.createElement('span'); chip.className = 'fbar-chip';
    if(state.filterNights === n) chip.classList.add('active');
    chip.textContent = n+'天';
    chip.onclick = ()=>{
      state.filterNights = state.filterNights === n ? '' : n;
      renderFilterChips();
      renderHotRoutes();
    };
    nc.appendChild(chip);
  });
}

// ======== HOT ROUTES ========
function filterByChips(item){
  // 应用月份和晚数筛选
  if(state.filterMonth) {
    const m = item.dep_date ? item.dep_date.split('-')[1] : '';
    if(m !== state.filterMonth) return false;
  }
  if(state.filterNights) {
    if(item.nights !== state.filterNights) return false;
  }
  return true;
}

function renderHotRoutes(){
  const grid = document.getElementById('hotGrid'); grid.innerHTML = '';
  grid.style.display = '';  // 重置display，避免region tab的block影响其他tab
  const fromCity = state.from.name;
  const today = new Date(); today.setHours(0,0,0,0);
  
  // 判断当前激活的Tab
  const activeTab = document.querySelector('.route-tab.active');
  const tabName = activeTab ? activeTab.dataset.tab : '尾单';
  
  const badge = document.getElementById('hotSectionBadge');
  const title = document.getElementById('hotSectionTitle');
  const backBtn = document.getElementById('hotBackBtn');
  
  // 刷新筛选Chips
  renderFilterChips();
  
  // ========== 非首页模式：嵌入搜索结果/详情 ==========
  if(state.viewMode === 'results') {
    backBtn.style.display = 'flex';
    backBtn.onclick = () => { state.viewMode = 'home'; renderHotRoutes(); };
    badge.textContent = '🔍 搜索结果';
    badge.style.background = 'var(--primary)';
    title.textContent = `${state.from.name} → ${state.to.name} · ${state.results.length}个班期`;
    renderGridResults();
    return;
  }
  if(state.viewMode === 'detail') {
    backBtn.style.display = 'flex';
    backBtn.onclick = () => { state.viewMode = 'results'; renderHotRoutes(); };
    badge.textContent = '📋 产品详情';
    badge.style.background = 'var(--primary)';
    title.textContent = `${state.from.name} → ${state.to.name}`;
    renderGridDetail();
    return;
  }
  // 首页模式：隐藏返回按钮
  backBtn.style.display = 'none';
  
  // ========== 用户手动输入航线：精确匹配展示 ==========
  if(!state.tabChanged && fromCity !== state.to.name) {
    const routeKey = `${fromCity}→${state.to.name}`;
    const matchedRoute = flightRoutes.find(r => r.route === routeKey);
    if(matchedRoute) {
      badge.textContent = '🔍 搜索';
      badge.style.background = 'var(--primary)';
      title.textContent = `${routeKey} · 未来30天余位排序`;
      
      const thirtyDaysLater = new Date(today); thirtyDaysLater.setDate(thirtyDaysLater.getDate() + 30);
      const tripMode = document.querySelector('input[name="trip"]:checked').value;
      const items = matchedRoute.items.filter(item => {
        if(!item.dep_date) return false;
        if(!item.retail_price || item.retail_price <= 0) return false;
        if(item.available <= 0) return false;
        // 按往返/单程筛选
        const hasReturn = !!item.ret_date;
        if(tripMode === 'round' && !hasReturn) return false;
        if(tripMode === 'oneway' && hasReturn) return false;
        if(!filterByChips(item)) return false;
        const depDate = new Date(item.dep_date);
        return depDate >= today && depDate <= thirtyDaysLater;
      });
      
      if(items.length === 0) {
        grid.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text3);font-size:13px;">该航线未来30天暂无余位</div>';
        return;
      }
      
      items.sort((a,b) => a.available - b.available);
      
      const wrap = document.createElement('div'); wrap.className = 'hot-scroll-wrap';
      const list = document.createElement('div'); list.className = 'hot-scroll-list';
      
      items.slice(0, 50).forEach(item => {
        const div = document.createElement('div'); div.className = 'hot-scroll-item';
        const retD = item.ret_date || '';
        const isRound = !!retD;
        let availClass = 's-avail-high';
        if(item.available <= 3) availClass = 's-avail-low';
        else if(item.available <= 10) availClass = 's-avail-mid';
        div.innerHTML = `
          <div class="s-row1">
            <span class="s-route">${routeKey}</span>
            <span class="s-price">&#165;${item.retail_price}</span>
          </div>
          <div class="s-row2">
            <span class="s-meta">${item.flight1}${isRound?' / '+item.flight2:''} · ${(()=>{const p=item.dep_date.split('-');return parseInt(p[1])+'月'+parseInt(p[2])+'日'})()}出发${isRound?' · '+item.nights+'天团':''} · ${item.baggage||''} ${item.meal||''}</span>
            <span class="s-avail ${availClass}">余${item.available}位</span>
          </div>
        `;
        div.onclick = ()=>{
          state.to.name = item.dest;
          document.querySelector('#toCity .fc-name').textContent = item.dest;
          if(item.dep_date) {
            state.depDate = new Date(item.dep_date);
            state.currentMonth = new Date(state.depDate.getFullYear(), state.depDate.getMonth(), 1);
            if(item.ret_date) state.retDate = new Date(item.ret_date);
          }
          updateDateDisplay();
          renderCalendar();
          doSearch();
        };
        list.appendChild(div);
      });
      
      wrap.appendChild(list);
      grid.style.display = 'block';
      grid.appendChild(wrap);
      return;
    }
  }
  
  // ========== 区域匹配规则 ==========
  const REGION_MAP = {
    '日本': ['东京','大阪','冲绳','福冈','札幌'],
    '韩国': ['首尔','济州岛','釜山','清州'],
    '东南亚': ['普吉','曼谷','巴厘岛','沙巴','新加坡','富国岛','清迈'],
    '港澳': ['香港','澳门']
  };
  
  if(tabName === '热门') {
    // 国庆模式：展示9/28~10/8出发的所有航线
    badge.textContent = '国庆';
    badge.style.background = 'var(--primary)';
    title.textContent = '国庆期间 · 热门航线组合';
    
    const ndStart = '2026-09-28';
    const ndEnd = '2026-10-08';
    const nationalDayDeals = [];
    
    flightRoutes.forEach(route => {
      if(route.dep !== fromCity) return;
      route.items.forEach(item => {
        if(!item.dep_date) return;
        if(item.dep_date < ndStart || item.dep_date > ndEnd) return;
        if(!item.retail_price || item.retail_price <= 0) return;
        // 按往返/单程筛选
        const tm = document.querySelector('input[name="trip"]:checked').value;
        if(tm === 'round' && !item.ret_date) return;
        if(tm === 'oneway' && item.ret_date) return;
        if(!filterByChips(item)) return;
        nationalDayDeals.push({
          ...item,
          route: route.route,
          dest: route.dest,
          dep: route.dep,
          color: route.color,
        });
      });
    });
    
    if(nationalDayDeals.length === 0){
      grid.innerHTML = '<div style="grid-column:span 2;text-align:center;padding:20px;color:var(--text3);font-size:13px;">国庆期间暂无航线数据</div>';
      return;
    }
    
    // 按航线+天数分组展示，每条航线展示最便宜的
    const seen = new Set();
    const group = [];
    nationalDayDeals.forEach(d => {
      const key = d.route;
      if(seen.has(key)) return;
      seen.add(key);
      const routeItems = nationalDayDeals.filter(x => x.route === key);
      const prices = routeItems.map(x => x.retail_price).filter(p => p > 0);
      const minP = Math.min(...prices);
      const depDates = [...new Set(routeItems.map(x => x.dep_date))].sort();
      group.push({ ...d, minP, depDates, count: routeItems.length });
    });
    
    group.sort((a,b) => a.minP - b.minP);
    group.slice(0, 8).forEach(d => {
      const div = document.createElement('div'); div.className = 'hot-item';
      const dateRange = d.depDates.length > 1
        ? `${d.depDates[0].slice(5)}~${d.depDates[d.depDates.length-1].slice(5)}`
        : d.depDates[0].slice(5);
      div.innerHTML = `
        <div class="route">${d.dep} → ${d.dest}</div>
        <div class="price">&#165;${d.minP} <small style="font-size:11px;color:var(--text3)">起</small></div>
        <div class="meta">${d.count}个班期 · ${dateRange}</div>
        <div class="count-badge" style="color:var(--primary-light)">${d.flight1}</div>
      `;
      div.onclick = ()=>{
        state.to.name = d.dest;
        document.querySelector('#toCity .fc-name').textContent = d.dest;
        // 同步日期
        if(d.dep_date) {
          state.depDate = new Date(d.dep_date);
          state.currentMonth = new Date(state.depDate.getFullYear(), state.depDate.getMonth(), 1);
          if(d.ret_date) state.retDate = new Date(d.ret_date);
        }
        updateDateDisplay();
        renderCalendar();
        doSearch();
      };
      grid.appendChild(div);
    });
    return;
  }
  
  // ========== 区域Tab：日本/韩国/东南亚/港澳 ==========
  const regionKeywords = REGION_MAP[tabName];
  if(regionKeywords) {
    badge.style.background = 'var(--primary)';
    
    if(tabName === '日本') { badge.textContent = '🇯🇵 日本'; title.textContent = '日本 · 未来30天余位排序'; }
    else if(tabName === '韩国') { badge.textContent = '🇰🇷 韩国'; title.textContent = '韩国 · 未来30天余位排序'; }
    else if(tabName === '东南亚') { badge.textContent = '🌏 东南亚'; title.textContent = '东南亚 · 未来30天余位排序'; }
    else if(tabName === '港澳') { badge.textContent = '🇭🇰 港澳'; title.textContent = '港澳 · 未来30天余位排序'; }
    
    // 收集该区域未来30天有余位的所有产品
    const thirtyDaysLater = new Date(today); thirtyDaysLater.setDate(thirtyDaysLater.getDate() + 30);
    const allProducts = [];
    
    flightRoutes.forEach(route => {
      if(route.dep !== fromCity) return;
      const isRegion = regionKeywords.some(kw => route.dest.includes(kw));
      if(!isRegion) return;
      
      route.items.forEach(item => {
        if(!item.dep_date) return;
        if(!item.retail_price || item.retail_price <= 0) return;
        if(item.available <= 0) return;
        const depDate = new Date(item.dep_date);
        if(depDate < today || depDate > thirtyDaysLater) return;
        // 按往返/单程筛选
        const tm = document.querySelector('input[name="trip"]:checked').value;
        if(tm === 'round' && !item.ret_date) return;
        if(tm === 'oneway' && item.ret_date) return;
        if(!filterByChips(item)) return;
        allProducts.push({
          ...item,
          route: route.route,
          dest: route.dest,
          dep: route.dep,
          color: route.color,
          airline_str: route.airline_str,
          dayDiff: Math.ceil((depDate - today) / 86400000)
        });
      });
    });
    
    if(allProducts.length === 0){
      grid.innerHTML = `<div style="text-align:center;padding:30px;color:var(--text3);font-size:13px;">${tabName}区域未来30天暂无余位</div>`;
      return;
    }
    
    // 按余位从少到多排序
    allProducts.sort((a,b) => a.available - b.available);
    
    // 用可滚动列表展示
    const wrap = document.createElement('div'); wrap.className = 'hot-scroll-wrap';
    const list = document.createElement('div'); list.className = 'hot-scroll-list';
    
    allProducts.slice(0, 50).forEach(item => {
      const div = document.createElement('div'); div.className = 'hot-scroll-item';
      const retD = item.ret_date || '';
      const isRound = !!retD;
      
      let availClass = 's-avail-high';
      if(item.available <= 3) availClass = 's-avail-low';
      else if(item.available <= 10) availClass = 's-avail-mid';
      
      div.innerHTML = `
        <div class="s-row1">
          <span class="s-route">${item.dep} → ${item.dest}</span>
          <span class="s-price">&#165;${item.retail_price}</span>
        </div>
        <div class="s-row2">
          <span class="s-meta">${item.flight1}${isRound?' / '+item.flight2:''} · ${(()=>{const p=item.dep_date.split('-');return parseInt(p[1])+'月'+parseInt(p[2])+'日'})()}出发${isRound?' · '+item.nights+'天团':''}</span>
          <span class="s-avail ${availClass}">余${item.available}位</span>
        </div>
      `;
      div.onclick = ()=>{
        state.to.name = item.dest;
        document.querySelector('#toCity .fc-name').textContent = item.dest;
        // 同步日期到该产品的具体去程/回程
        if(item.dep_date) {
          state.depDate = new Date(item.dep_date);
          state.currentMonth = new Date(state.depDate.getFullYear(), state.depDate.getMonth(), 1);
          if(item.ret_date) state.retDate = new Date(item.ret_date);
        }
        updateDateDisplay();
        renderCalendar();
        doSearch();
      };
      list.appendChild(div);
    });
    
    wrap.appendChild(list);
    grid.style.display = 'block';
    grid.innerHTML = '';
    grid.appendChild(wrap);
    return;
  }
  
  // ========== 尾单模式（默认） ==========
  badge.textContent = '尾单';
  badge.style.background = 'var(--danger)';
  title.textContent = '余位告急 · 一周内出发';
  
  const twoWeeksLater = new Date(today); twoWeeksLater.setDate(twoWeeksLater.getDate() + 14);

  // 收集所有尾单产品：余位少 + 出发临近 + 价格好
  const deals = [];
  flightRoutes.forEach(route => {
    if(route.dep !== fromCity) return;
    route.items.forEach(item => {
      if(!item.dep_date) return;
      const depDate = new Date(item.dep_date);
      if(depDate < today || depDate > twoWeeksLater) return;
      const isLastMinute = item.available <= 3;
      const isNear = depDate <= twoWeeksLater;
      if(isLastMinute && isNear) {
        // 按往返/单程筛选
        const tm = document.querySelector('input[name="trip"]:checked').value;
        if(tm === 'round' && !item.ret_date) return;
        if(tm === 'oneway' && item.ret_date) return;
        if(!filterByChips(item)) return;
        deals.push({
          ...item,
          route: route.route,
          dest: route.dest,
          dep: route.dep,
          color: route.color,
          dayDiff: Math.ceil((depDate - today) / 86400000),
          score: item.available * 10 - (route.max_price - item.retail_price) / 100 + item.dayDiff
        });
      }
    });
  });

  // 按紧急程度排：出发最近 + 余位最少 + 价格好的优先
  deals.sort((a,b) => {
    if(a.available !== b.available) return a.available - b.available;
    return a.dayDiff - b.dayDiff;
  });

  if(deals.length === 0){
    grid.innerHTML = '<div style="grid-column:span 2;text-align:center;padding:20px;color:var(--text3);font-size:13px;">暂无近期限时尾单</div>';
    return;
  }

  // 去重：同航线只展示最优惠的一条
  const seen = new Set();
  const topDeals = [];
  deals.forEach(d => {
    const key = d.route;
    if(seen.has(key)) return;
    seen.add(key);
    topDeals.push(d);
  });

  topDeals.slice(0, 8).forEach(d => {
    const div = document.createElement('div'); div.className = 'hot-item';
    const remainingText = d.available <= 1 ? '最后1位' : `仅剩${d.available}位`;
    div.innerHTML = `
      <div class="route">${d.dep} → ${d.dest}</div>
      <div class="price">&#165;${d.retail_price}</div>
      <div class="meta" style="color:var(--danger)">${remainingText} · ${(()=>{const p=d.dep_date.split('-');return parseInt(p[1])+'月'+parseInt(p[2])+'日'})()}出发</div>
      <div class="count-badge" style="color:var(--amber)">${d.flight1}</div>
    `;
    div.onclick = ()=>{
      state.to.name = d.dest;
      document.querySelector('#toCity .fc-name').textContent = d.dest;
      // 同步日期到该产品的具体去程/回程
      if(d.dep_date) {
        state.depDate = new Date(d.dep_date);
        state.currentMonth = new Date(state.depDate.getFullYear(), state.depDate.getMonth(), 1);
        if(d.ret_date) state.retDate = new Date(d.ret_date);
      }
      updateDateDisplay();
      renderCalendar();
      doSearch();
    };
    grid.appendChild(div);
  });
}

// ======== SEARCH RESULTS (保留旧版供排序等引用) ========
function doSearch(){
  const routeKey = `${state.from.name}→${state.to.name}`;
  const route = flightRoutes.find(r => r.route === routeKey);
  if(!route || !route.items || route.items.length===0){
    alert(`未找到 ${routeKey} 的航班数据`);
    return;
  }
  state.currentRoute = route;
  // 根据往返/单程筛选
  const isRound = document.querySelector('input[name="trip"]:checked').value === 'round';
  state.results = route.items.filter(item => {
    const hasReturn = !!item.ret_date;
    return isRound ? hasReturn : !hasReturn;
  });
  // 同航线按出发日期升序
  state.results.sort((a,b) => (a.dep_date||'').localeCompare(b.dep_date||''));
  if(state.results.length === 0) {
    alert(`该航线暂无${isRound?'团票（往返）':'单程'}产品`);
    state.results = [...route.items];
  }
  // 嵌入首页滑动区
  state.viewMode = 'results';
  renderHotRoutes();
}

function renderResults(){
  document.getElementById('resultRoute').textContent = `${state.from.name} → ${state.to.name}`;
  document.getElementById('resultDate').textContent = `${state.results.length}个可售班期`;
  document.getElementById('resultSummary').innerHTML =
    `<strong>${state.results.length}</strong> 个结果 · 价格 <strong>&#165;${state.currentRoute.min_price}</strong> ~ <strong>&#165;${state.currentRoute.max_price}</strong>` +
    `  · 航司 ${state.currentRoute.airline_str}`;
  const list = document.getElementById('flightList'); list.innerHTML = '';
  state.results.forEach((item, idx) => {
    const card = document.createElement('div'); card.className = 'flight-card';
    const depD = item.dep_date||'--';
    const retD = item.ret_date||'';
    const isRound = !!retD;
    const nightsStr = item.nights > 0 ? `${item.nights}晚` : '';
    const tripTag = isRound ? `${item.nights}天团` : '单程';
    const tagStyle = isRound ? 'color:var(--green)' : 'color:var(--amber)';
    // 格式化日期为 M月D日
    const fmtDate = (d) => {
      if(!d || d === '--') return '--';
      const parts = d.split('-');
      return `${parseInt(parts[1])}月${parseInt(parts[2])}日`;
    };
    card.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
        <div>
          <div style="font-size:16px;font-weight:500;color:var(--text1);line-height:1.3">${state.from.name} → ${state.to.name}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">${item.airline||state.currentRoute.airline_str} ${item.flight1}${isRound?' / '+item.flight2:''}</div>
        </div>
        <span class="tag" style="background:color-mix(in srgb,var(--green) 20%,transparent);${tagStyle};flex-shrink:0">${tripTag}</span>
      </div>
      <div class="date-line">
        <span class="date-block">
          <span class="date-label">去程</span>
          <span class="date-val">${fmtDate(depD)}</span>
          <span class="time-val">${item.f1_dep_time||''}${item.f1_arr_time?'→'+item.f1_arr_time:''}</span>
        </span>
        ${isRound ? `<span class="date-arrow">&#8594;</span>
        <span class="date-block">
          <span class="date-label">回程</span>
          <span class="date-val">${fmtDate(retD)}</span>
          <span class="time-val">${item.f2_dep_time||''}${item.f2_arr_time?'→'+item.f2_arr_time:''}</span>
        </span>` : '<span class="date-arrow">&#8594;</span><span class="date-block"><span class="date-label">&nbsp;</span><span class="date-val" style="color:var(--text3)">单程直达</span></span>'}
        <span class="date-block" style="margin-left:auto;text-align:right">
          <span class="date-label">价格</span>
          <span class="date-val" style="color:var(--green);font-weight:600;font-size:16px">&#165;${item.retail_price}</span>
        </span>
      </div>
      <div class="bottom-row" style="margin-top:8px">
        <span>&#128202; 余${item.available}位</span>
        <span>${isRound ? '&#128198; '+nightsStr : ''}</span>
        <span style="color:var(--text3);font-size:10px">${item.baggage||''} ${item.meal||''}</span>
        <span style="color:var(--text3);font-size:10px">含税</span>
      </div>
    `;
    card.onclick = ()=>openDetail(item);
    list.appendChild(card);
  });
}

// ======== DETAIL ========
function openDetail(item){
  document.getElementById('detailRoute').textContent = `${state.from.name} → ${state.to.name}`;
  const depD = item.dep_date||'--';
  const retD = item.ret_date||'';
  const isRound = !!retD;
  // 格式化日期
  const fmtD = (d) => {
    if(!d || d === '--') return '--';
    const p = d.split('-');
    return `${parseInt(p[1])}月${parseInt(p[2])}日`;
  };
  document.getElementById('detailDate').textContent = isRound ? `${fmtD(depD)} ~ ${fmtD(retD)}` : `${fmtD(depD)} · 单程`;
  document.getElementById('detailDepCity').textContent = state.from.name;
  document.getElementById('detailDestCity').textContent = state.to.name;
  document.getElementById('detailFlightNo').textContent = item.flight1;
  document.getElementById('detailMeta').textContent =
    isRound
      ? `${item.airline||''} · ${item.flight1} / ${item.flight2} · ${depD} ~ ${retD} · ${item.nights}天团`
      : `${item.airline||''} · ${item.flight1} · ${depD} · 单程`;
  document.getElementById('detailTags').innerHTML =
    `<span class="dtag" style="background:color-mix(in srgb,var(--primary) 20%,transparent);color:var(--primary-light);font-weight:500">&#165;${item.retail_price}</span>` +
    `<span class="dtag">余${item.available}位</span>` +
    (isRound?`<span class="dtag">${item.nights}天团</span>`:'<span class="dtag">单程</span>') +
    (item.baggage?`<span class="dtag">${item.baggage}</span>`:'') +
    (item.meal?`<span class="dtag">${item.meal}</span>`:'') +
    `<span class="dtag">含税</span>`;

  document.getElementById('cabinBestName').textContent =
    `${item.airline||state.currentRoute?.airline_str||''} ${item.flight1}${isRound?' / '+item.flight2:''}`;
  document.getElementById('cabinBestPrice').innerHTML = `&#165;${item.retail_price}`;
  document.getElementById('cabinBestInfo').textContent =
    isRound
      ? `${depD} ~ ${retD} · ${item.nights}天团 · 余${item.available}位`
      : `${depD} · 单程直达 · 余${item.available}位`;
  document.getElementById('cabinBestInfo').textContent +=
    (item.baggage?` · ${item.baggage}`:'') + (item.meal?` · ${item.meal}`:'') + ' · 价格含税';
  // 添加时刻信息
  const timeInfo = document.getElementById('cabinTimeInfo');
  if(timeInfo) {
    const f1t = item.f1_dep_time ? `${item.f1_dep_time}→${item.f1_arr_time||'?'}` : '';
    const f2t = item.f2_dep_time ? ` / 回程${item.f2_dep_time}→${item.f2_arr_time||'?'}` : '';
    timeInfo.textContent = `${item.flight1} ${f1t}${isRound && f2t ? f2t : ''}${!isRound && item.flight2 ? ' / '+item.flight2 : ''}`;
  }
  document.getElementById('bookPrice').innerHTML = `&#165;${item.retail_price} <small>/人</small>`;
  
  // 单程产品 → 显示"拼回程"按钮
  const comboBtn = document.getElementById('comboBtn');
  if(!isRound) {
    comboBtn.style.display = 'block';
    comboBtn.textContent = state.combo.outbound ? '已选去程，选回程' : '拼回程';
    comboBtn.onclick = ()=>{
      state.combo.outbound = item;
      // 自动搜索反向航线
      const origFrom = state.from.name;
      const origTo = state.to.name;
      state.from.name = origTo;
      state.to.name = origFrom;
      document.querySelector('#fromCity .fc-name').textContent = origTo;
      document.querySelector('#toCity .fc-name').textContent = origFrom;
      doSearch();
      // 结果上方提示
      document.getElementById('resultSummary').innerHTML =
        `已选去程: ${item.flight1} ${item.dep_date} &#165;${item.retail_price} · 请选择回程航班`;
      document.getElementById('resultSummary').style.color = 'var(--amber)';
      // 每个结果卡片加"选为回程"
      setTimeout(()=>{
        document.querySelectorAll('.flight-card').forEach(card => {
          const btn = document.createElement('button');
          btn.textContent = '选为回程';
          btn.style.cssText = 'margin-top:8px;padding:6px 16px;border:none;border-radius:8px;background:var(--primary);color:#fff;font-size:12px;cursor:pointer;width:100%';
          btn.onclick = (e)=>{
            e.stopPropagation();
            const idx = Array.from(card.parentNode.children).indexOf(card);
            state.combo.return = state.results[idx];
            const total = state.combo.outbound.retail_price + state.combo.return.retail_price;
            document.getElementById('consultContent').innerHTML =
`<b>航线</b>: ${state.combo.outbound.dep}→${state.combo.outbound.dest} (组合)<br>
<b>去程</b>: ${state.combo.outbound.flight1} ${state.combo.outbound.dep_date} &#165;${state.combo.outbound.retail_price}<br>
<b>回程</b>: ${state.combo.return.flight1} ${state.combo.return.dep_date} &#165;${state.combo.return.retail_price}<br>
<b>合计</b>: <span style="color:var(--primary-light);font-weight:600">&#165;${total}/人</span> <span style="color:var(--text3)">含税</span>`;
            document.getElementById('consultModal').classList.add('show');
            document.getElementById('consultSheet').style.display = 'flex';
            state.combo = {outbound: null, return: null};
            comboBtn.style.display = 'none';
            switchPage('search');
          };
          card.appendChild(btn);
        });
      }, 50);
    };
  } else {
    comboBtn.style.display = 'none';
  }
  
  document.getElementById('bookBtn').onclick = ()=>{
    const isRound = !!retD;
    document.getElementById('consultContent').innerHTML =
`<b>航线</b>: ${state.from.name}→${state.to.name}<br>
<b>航班</b>: ${item.flight1}${isRound?' / '+item.flight2:''}<br>
<b>${isRound?'去程: '+depD+'  回程: '+retD+'<br><b>天数</b>: '+item.nights+'天团':'日期: '+depD+' · 单程'}<br>
<b>余位</b>: ${item.available}位<br>
<b>价格</b>: &#165;${item.retail_price}/人 <span style="color:var(--text3)">含税</span>`;
    document.getElementById('consultModal').classList.add('show');
    document.getElementById('consultSheet').style.display = 'flex';
  };
  switchPage('detail');
}

// ======== SORT ========
function applySort(sort){
  if(sort === 'price-low') state.results.sort((a,b)=>a.retail_price - b.retail_price);
  else if(sort === 'price-high') state.results.sort((a,b)=>b.retail_price - a.retail_price);
  else if(sort === 'date') state.results.sort((a,b)=>(a.dep_date||'').localeCompare(b.dep_date||''));
  else state.results.sort((a,b)=>a.retail_price - b.retail_price);
  renderResults();
}

// ======== PAGE SWITCH ========
function switchPage(page){
  state.currentPage = page;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  if(page==='search') {document.getElementById('page-search').classList.add('active'); document.body.style.paddingBottom='calc(var(--tab-h) + var(--safe-bottom) + 8px)';}
  else if(page==='results') {document.getElementById('page-results').classList.add('active'); document.body.style.paddingBottom='calc(var(--tab-h) + var(--safe-bottom) + 8px)';}
  else if(page==='detail') {document.getElementById('page-detail').classList.add('active'); document.body.style.paddingBottom='calc(var(--tab-h) + var(--safe-bottom) + 80px)';}
}

// ======== ROUTE TABS ========
const TAB_ROUTES = {
  '尾单': null,
  '热门': '大阪',
  '日本': '东京',
  '韩国': '首尔',
  '东南亚': '沙巴',
  '港澳': '香港'
};
document.querySelectorAll('.route-tab').forEach(tab => {
  tab.onclick = ()=>{
    document.querySelectorAll('.route-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    const tabName = tab.dataset.tab;
    state.tabChanged = true;  // Tab切换标志
    
    // 尾单tab — 不改变搜索框，只刷新尾单列表
    if(tabName === '尾单') {
      renderHotRoutes();
      return;
    }
    
    // 其他tab — 切换搜索框
    const destCity = TAB_ROUTES[tabName];
    if(destCity) {
      state.to.name = destCity;
      document.querySelector('#toCity .fc-name').textContent = destCity;
      
      if(tabName === '热门') {
        // 热门=国庆，默认9/30~10/5
        state.depDate = new Date('2026-09-30');
        state.retDate = new Date('2026-10-05');
        state.currentMonth = new Date(2026, 8, 1);
        updateDateDisplay();
        renderCalendar();
      } else {
        // 其他Tab: 自动设置最近出发日期和返程
        const routeKey = `${state.from.name}→${destCity}`;
        const route = flightRoutes.find(r => r.route === routeKey);
        if(route && route.items.length > 0) {
          const today = new Date(); today.setHours(0,0,0,0);
          let nearest = null;
          route.items.forEach(item => {
            if(!item.dep_date) return;
            const d = new Date(item.dep_date);
            if(d >= today && (!nearest || d < nearest)) nearest = d;
          });
          if(nearest) {
            state.depDate = nearest;
            state.currentMonth = new Date(nearest.getFullYear(), nearest.getMonth(), 1);
            const depISO = nearest.toISOString().split('T')[0];
            const matchItem = route.items.find(i => i.dep_date === depISO && i.ret_date);
            if(matchItem && matchItem.ret_date) {
              state.retDate = new Date(matchItem.ret_date);
            } else {
              const anyRet = route.items.find(i => i.ret_date);
              if(anyRet) state.retDate = new Date(anyRet.ret_date);
            }
            updateDateDisplay();
            renderCalendar();
          }
        }
      }
      updateCalendarPrices();
    }
    renderHotRoutes();
  };
});

// ======== EVENT BINDINGS ========
document.getElementById('fromCity').onclick = ()=>openCityPicker('from');
document.getElementById('toCity').onclick = ()=>openCityPicker('to');
document.getElementById('closeCityModal').onclick = closeCityPicker;
document.getElementById('cityModal').onclick = closeCityPicker;
document.getElementById('citySheet').onclick = e=>e.stopPropagation();
document.getElementById('citySearch').oninput = e=>renderCityList(e.target.value);
document.getElementById('swapBtn').onclick = swapCities;
document.getElementById('depDate').onclick = ()=>document.getElementById('calendarSection').classList.toggle('show');
document.getElementById('retDate').onclick = ()=>{};
document.getElementById('prevMonth').onclick = ()=>{state.currentMonth=new Date(state.currentMonth.getFullYear(),state.currentMonth.getMonth()-1,1);renderCalendar()};
document.getElementById('nextMonth').onclick = ()=>{state.currentMonth=new Date(state.currentMonth.getFullYear(),state.currentMonth.getMonth()+1,1);renderCalendar()};
document.getElementById('paxSheet').onclick = e=>e.stopPropagation();
// Consult modal
document.getElementById('closeConsult').onclick = ()=>{document.getElementById('consultModal').classList.remove('show');document.getElementById('consultSheet').style.display='none'};
document.getElementById('consultModal').onclick = ()=>{document.getElementById('consultModal').classList.remove('show');document.getElementById('consultSheet').style.display='none'};
document.getElementById('consultSheet').onclick = e=>e.stopPropagation();
document.getElementById('consultDone').onclick = ()=>{document.getElementById('consultModal').classList.remove('show');document.getElementById('consultSheet').style.display='none'};
document.getElementById('searchBtn').onclick = doSearch;
// 往返/单程切换
document.querySelectorAll('input[name="trip"]').forEach(r => r.onchange = ()=>{
  state.trip = r.value;
  state.filterMonth = '';  // 切换团票/单程时重置筛选
  state.filterNights = '';
  if(state.viewMode === 'home') {
    renderHotRoutes();
  } else if(state.currentPage === 'results' && state.currentRoute) {
    const isRound = state.trip === 'round';
    state.results = state.currentRoute.items.filter(item => {
      const hasReturn = !!item.ret_date;
      return isRound ? hasReturn : !hasReturn;
    });
    state.results.sort((a,b) => (a.dep_date||'').localeCompare(b.dep_date||''));
    if(state.results.length === 0) {
      state.results = [...state.currentRoute.items];
    }
    renderResults();
  }
});
document.getElementById('backToSearch').onclick = ()=>{ state.viewMode = 'home'; renderHotRoutes(); };
document.getElementById('backToResults').onclick = ()=>{ state.viewMode = 'home'; renderHotRoutes(); };
document.getElementById('modifyBtn').onclick = ()=>{ state.viewMode = 'home'; renderHotRoutes(); };
document.querySelectorAll('.sort-item').forEach(s=>{s.onclick=()=>{document.querySelectorAll('.sort-item').forEach(x=>x.classList.remove('active'));s.classList.add('active');applySort(s.dataset.sort)}});
document.querySelectorAll('.bottom-tab .tab-item').forEach(t=>{t.onclick=()=>{const p=t.dataset.page;document.querySelectorAll('.bottom-tab .tab-item').forEach(x=>x.classList.remove('active'));t.classList.add('active');if(p!=='search'){alert(`「${t.querySelector('.tab-label').textContent}」页面（Demo）`);switchPage('search')}}});

// ======== INIT ========
loadData();
</script>
