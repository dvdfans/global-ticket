<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>环球机票</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#f5f5f7;--card:#fff;--card2:#f0f0f3;--text:#1d1d1f;--text2:#333;--text3:#86868b;--border:#e5e5ea;--primary:#007aff;--primary-light:#007aff;--green:#34c759;--amber:#ff9500;--danger:#ff3b30;--safe-bottom:env(safe-area-inset-bottom,0px);--tab-h:56px}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1e;--card:#2c2c2e;--card2:#3a3a3c;--text:#f5f5f7;--text2:#d1d1d6;--text3:#8e8e93;--border:#38383a;--primary:#0a84ff;--green:#30d158;--amber:#ff9f0a;--danger:#ff453a}}
[data-theme=dark]{--bg:#1c1c1e;--card:#2c2c2e;--card2:#3a3a3c;--text:#f5f5f7;--text2:#d1d1d6;--text3:#8e8e93;--border:#38383a;--primary:#0a84ff;--green:#30d158;--amber:#ff9f0a;--danger:#ff453a}
[data-theme=light]{--bg:#f5f5f7;--card:#fff;--card2:#f0f0f3;--text:#1d1d1f;--text2:#333;--text3:#86868b;--border:#e5e5ea;--primary:#007aff;--green:#34c759;--amber:#ff9500;--danger:#ff3b30}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;overflow-x:hidden}
.header{display:flex;align-items:center;gap:10px;padding:10px 16px 6px}
.header h1{font-size:16px;font-weight:500}
.tabs{display:flex;gap:2px;margin:0 12px 6px;overflow-x:auto;scrollbar-width:none}
.tab{flex-shrink:0;padding:6px 12px;font-size:12px;border-radius:8px;background:var(--card);color:var(--text3);cursor:pointer}
.tab.active{background:var(--primary);color:#fff}
.filter{background:var(--card);margin:0 12px;border-radius:10px;padding:6px 10px}
.frow{display:flex;align-items:center;gap:4px}
.fcity{flex:1;display:flex;align-items:baseline;gap:2px;padding:4px 8px;background:var(--card2);border-radius:8px;cursor:pointer}
.fcity .fl{font-size:8px;color:var(--text3)}.fcity .fn{font-size:13px;font-weight:500}.fcity .fc{font-size:9px;color:var(--text3)}
.fcity .fc::before{content:'('}.fcity .fc::after{content:')'}
.fswap{width:20px;height:20px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:10px}
.fbtn{width:30px;height:30px;border-radius:8px;background:var(--primary);border:none;color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ftrip{display:flex;gap:6px;margin-top:4px;padding-top:4px;border-top:1px solid var(--border)}
.ftrip label{font-size:10px;color:var(--text3);cursor:pointer;display:flex;align-items:center;gap:2px}
.ftrip input{accent-color:var(--primary);width:11px;height:11px}
.content{padding:8px 12px 80px}
.card{background:var(--card);border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer}
.card:active{background:var(--card2)}
.card .r1{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.card .route{font-size:15px;font-weight:500}
.card .tag{font-size:10px;padding:1px 6px;border-radius:6px;font-weight:500}
.card .dline{display:flex;align-items:center;gap:4px;padding:4px 0;font-size:12px;color:var(--text3)}
.card .dline .dt{font-size:13px;font-weight:500;color:var(--text)}
.card .price{font-size:16px;font-weight:600;color:var(--green)}
.card .bot{display:flex;gap:8px;margin-top:4px;font-size:10px;color:var(--text3)}
.empty{padding:40px;text-align:center;color:var(--text3);font-size:13px}
.error{padding:40px;text-align:center;color:var(--danger);font-size:13px}
</style>
</head>
<body>
<div class="header"><span id="langBtn" style="font-size:11px;cursor:pointer;padding:2px 8px;border-radius:8px;background:var(--card2);color:var(--text3);font-weight:500">EN</span><h1 id="title">环球机票</h1><span id="themeBtn" style="margin-left:auto;font-size:16px;cursor:pointer;padding:4px 8px;border-radius:8px;background:var(--card2)">🌙</span></div>
<div class="tabs" id="tabs">
  <span class="tab active" data-tab="尾单" id="tabWd">尾单</span>
  <span class="tab" data-tab="热门" id="tabRm">热门</span>
  <span class="tab" data-tab="日本" id="tabJp">日本</span>
  <span class="tab" data-tab="韩国" id="tabKr">韩国</span>
  <span class="tab" data-tab="泰国" id="tabTh">泰国</span>
  <span class="tab" data-tab="新加坡" id="tabSg">新加坡</span>
  <span class="tab" data-tab="马来西亚" id="tabMy">马来西亚</span>
  <span class="tab" data-tab="越南" id="tabVn">越南</span>
</div>
<div class="filter">
  <div class="frow">
    <div class="fcity" id="fromCity"><span class="fl">出发</span><span class="fn">上海</span></div>
    <span class="fswap" id="swapBtn">⇄</span>
    <div class="fcity" id="toCity"><span class="fl">到达</span><span class="fn" id="toName">首尔</span></div>
    <div class="ftrip" style="border:none;margin:0;padding:0">
      <label style="font-size:9px"><input type="radio" name="trip" value="round" checked> 团</label>
      <label style="font-size:9px"><input type="radio" name="trip" value="oneway"> 单</label>
    </div>
  </div>
</div>
<div class="content" id="content"><div class="empty" id="loadingText">加载中...</div></div>

<script>
// ======== 国际化 ========
const LANG = {
  zh: {
    title:'环球机票',loading:'加载中...',empty:'暂无匹配的产品',error:'加载失败',
    tabs:['尾单','热门','日本','韩国','泰国','新加坡','马来西亚','越南'],
    dep:'出发',arr:'到达',trip:'团票',oneway:'单程',
    remain:'余{0}位',tax:'含税',nights:'{0}天团',lbl:'中',
  },
  en: {
    title:'Global Ticket',loading:'Loading...',empty:'No products found',error:'Load failed',
    tabs:['LastMin','Hot','Japan','Korea','Thailand','Singapore','Malaysia','Vietnam'],
    dep:'From',arr:'To',trip:'Round',oneway:'OneWay',
    remain:'{0} left',tax:'tax incl.',nights:'{0} days',lbl:'EN',
  },
};
const CITY_EN = {
  '上海':'Shanghai','杭州':'Hangzhou','南京':'Nanjing','南通':'Nantong','无锡':'Wuxi',
  '首尔':'Seoul','济州岛':'Jeju','釜山':'Busan','清州':'Cheongju',
  '东京':'Tokyo','大阪':'Osaka','冲绳':'Okinawa','福冈':'Fukuoka','札幌':'Sapporo',
  '普吉':'Phuket','曼谷':'Bangkok','巴厘岛':'Bali','沙巴':'Sabah',
  '新加坡':'Singapore','富国岛':'Phu Quoc','清迈':'ChiangMai',
  '香港':'HongKong','澳门':'Macau',
};
const AIRLINE_EN = {
  '东方航空':'China Eastern','上海航空':'Shanghai Air','中国国航':'Air China',
  '南方航空':'China Southern','海南航空':'Hainan Air','吉祥航空':'Juneyao Air',
  '春秋航空':'Spring Air','厦门航空':'Xiamen Air','四川航空':'Sichuan Air',
  '深圳航空':'Shenzhen Air','山东航空':'Shandong Air','国泰航空':'Cathay Pacific',
  '全日空':'ANA','大韩航空':'Korean Air','新加坡航空':'Singapore Air',
  '韩亚航空':'Asiana','澳门航空':'Air Macau','日本航空':'Japan Air',
};

let lang = localStorage.getItem('lang') || 'zh';
function t(key, ...args){
  let txt = LANG[lang][key];
  if(!txt) return key;
  args.forEach((a,i)=>{ txt = txt.replace('{'+i+'}',a); });
  return txt;
}
function cityName(cn){ return lang==='en' ? (CITY_EN[cn]||cn) : cn; }
function airlineName(cn){ return lang==='en' ? (AIRLINE_EN[cn]||cn) : cn; }

function applyLang(){
  document.getElementById('title').textContent = t('title');
  document.getElementById('loadingText').textContent = t('loading');
  document.getElementById('langBtn').textContent = lang==='zh' ? 'EN' : '中';
  const tabIds = ['tabWd','tabRm','tabJp','tabKr','tabTh','tabSg','tabMy','tabVn'];
  t('tabs').forEach((txt,i)=>{ if(tabIds[i]) document.getElementById(tabIds[i]).textContent = txt; });
}

const STATE = {
  from: '上海', to: '首尔',
  trip: 'round',
  tab: '尾单',
  data: [],
};
const AIRPORT = {
  '上海浦东机场':'PVG','上海虹桥机场':'SHA','浦东国际机场':'PVG',
  '东京成田机场':'NRT','东京羽田机场':'HND',
  '首尔仁川机场':'ICN','首尔金浦机场':'GMP','仁川国际机场':'ICN',
  '大阪关西机场':'KIX','香港机场':'HKG','澳门机场':'MFM',
  '曼谷素万那普机场':'BKK','普吉机场':'HKT','普吉国际机场':'HKT',
  '巴厘岛机场':'DPS','樟宜机场':'SIN','新加坡樟宜机场':'SIN',
  '济州机场':'CJU','济州国际机场':'CJU','清迈机场':'CNX',
  '福冈机场':'FUK','冲绳那霸机场':'OKA','札幌新千岁机场':'CTS',
  '釜山金海机场':'PUS','亚庇国际机场':'BKI',
  '杭州萧山机场':'HGH','南京禄口机场':'NKG',
  '南通兴东机场':'NTG','苏南硕放机场':'WUX',
};
function ac(name){ return AIRPORT[name]||'   '; }

const REGIONS = {
  '日本': ['东京','大阪','冲绳','福冈','札幌'],
  '韩国': ['首尔','济州岛','釜山','清州'],
  '泰国': ['曼谷','普吉','清迈'],
  '新加坡': ['新加坡'],
  '马来西亚': ['沙巴'],
  '越南': ['富国岛'],
};

function fmt(d){ 
  if(!d)return'';
  const p=d.split('-');
  if(lang==='en') return p[1]+'/'+p[2];
  return parseInt(p[1])+'月'+parseInt(p[2])+'日'; 
}
function today(){ const d=new Date();d.setHours(0,0,0,0);return d; }

function getItems(){
  const r = REGIONS[STATE.tab];
  let items = [];
  STATE.data.forEach(route => {
    if(route.dep !== STATE.from) return;
    // 区域过滤
    if(r && !r.some(kw => route.dest.includes(kw))) return;
    route.items.forEach(item => {
      if(!item.dep_date || !item.retail_price || item.retail_price<=0) return;
      if(item.available<=0) return;
      if(STATE.trip==='round' && !item.ret_date) return;
      if(STATE.trip==='oneway' && item.ret_date) return;
      items.push(item);
    });
  });
  // 尾单过滤
  if(STATE.tab === '尾单'){
    const td = today();
    const tw = new Date(td); tw.setDate(tw.getDate()+14);
    items = items.filter(i => {
      const d = new Date(i.dep_date);
      return d>=td && d<=tw && i.available<=3;
    });
    items.sort((a,b)=>a.available-b.available);
  } else {
    items.sort((a,b)=>(a.dep_date||'').localeCompare(b.dep_date||''));
  }
  return items;
}

function render(){
  const el = document.getElementById('content');
  const items = getItems();
  
  if(items.length===0){
    el.innerHTML = '<div class="empty">'+t('empty')+'</div>';
    return;
  }
  
  let html = '';
  items.slice(0,30).forEach(item => {
    const isRound = !!item.ret_date;
    const tag = isRound ? t('nights',item.nights) : t('oneway');
    const tagC = isRound ? 'color:var(--green)' : 'color:var(--amber)';
    const bag = item.baggage||'';
    const meal = item.meal||'';
    const f1t = item.f1_dep_time ? item.f1_dep_time+'→'+item.f1_arr_time : '';
    const f2t = item.f2_dep_time ? item.f2_dep_time+'→'+item.f2_arr_time : '';
    const depCity = cityName(item.dep);
    const destCity = cityName(item.dest);
    const airName = airlineName(item.airline);
    
    html += '<div class="card" onclick="alert(\''+t('trip')+': '+item.flight1+' '+item.dep_date+' ¥'+item.retail_price+'\')">';
    html += '<div class="r1"><span class="route">'+depCity+'→'+destCity+'</span>';
    html += '<span class="tag" style="background:color-mix(in srgb,var(--green)20%,transparent);'+tagC+'">'+tag+'</span></div>';
    html += '<div style="font-size:10px;color:var(--text3)">'+airName+' '+item.flight1+(isRound?' / '+item.flight2:'')+'</div>';
    html += '<div class="dline">';
    html += '<span>'+t('dep')+' <span class="dt">'+fmt(item.dep_date)+'</span> '+f1t+'</span>';
    if(isRound) html += '<span style="margin-left:8px">'+t('arr')+' <span class="dt">'+fmt(item.ret_date)+'</span> '+f2t+'</span>';
    html += '<span class="price" style="margin-left:auto">¥'+item.retail_price+'</span>';
    html += '</div>';
    html += '<div class="bot"><span>'+t('remain',item.available)+'</span><span>'+bag+'</span><span>'+meal+'</span><span>'+t('tax')+'</span></div>';
    html += '</div>';
  });
  
  el.innerHTML = html;
}

// 加载数据
fetch('flight_data.json?v='+Date.now())
  .then(r => { if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(d => {
    STATE.data = d;
    render();
  })
  .catch(e => {
    document.getElementById('content').innerHTML = '<div class="error">❌ '+t('error')+': '+e.message+'</div>';
  });

// Tab切换
document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = ()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    STATE.tab = tab.dataset.tab;
    render();
  };
});

// 语言切换
document.getElementById('langBtn').onclick = ()=>{
  lang = lang==='zh' ? 'en' : 'zh';
  localStorage.setItem('lang', lang);
  applyLang();
  render();
};

// 深色/浅色切换
(function(){
  const btn = document.getElementById('themeBtn');
  const sysDark = window.matchMedia('(prefers-color-scheme:dark)').matches;
  let theme = localStorage.getItem('theme') || (sysDark ? 'dark' : 'light');
  if(theme === 'dark') document.documentElement.setAttribute('data-theme','dark');
  btn.textContent = theme === 'dark' ? '☀️' : '🌙';
  btn.onclick = ()=>{
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    btn.textContent = next === 'dark' ? '☀️' : '🌙';
    localStorage.setItem('theme', next);
  };
})();
</script>
</body>
</html>
